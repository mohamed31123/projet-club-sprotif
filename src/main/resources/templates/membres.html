<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestion des Membres</title>

    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            padding:40px;
        }

        h2{
            color:#333;
        }

        form{
            background:white;
            padding:20px;
            border-radius:8px;
            width:350px;
            margin-bottom:30px;
        }

        input, select{
            width:100%;
            padding:8px;
            margin:8px 0;
        }

        button{
            padding:8px 15px;
            background:#1976d2;
            color:white;
            border:none;
            border-radius:4px;
        }

        table{
            width:100%;
            background:white;
            border-collapse:collapse;
        }

        th,td{
            padding:10px;
            border:1px solid #ddd;
        }

        th{
            background:#1976d2;
            color:white;
        }

    </style>

</head>

<body>

<h2>Gestion des Membres</h2>

<h3>Ajouter un membre</h3>

<form th:action="@{/membres}" method="post">

    <label>Nom :</label>
    <input type="text" name="nom" required>

    <label>Catégorie :</label>
    <select name="categorie">
        <option value="Etudiant">Etudiant</option>
        <option value="Senior">Senior</option>
        <option value="Adulte">Adulte</option>
    </select>

    <label>Date d'adhésion :</label>
    <input type="date" name="dateAdhesion">

    <button type="submit">Ajouter</button>

</form>

<h3>Liste des membres</h3>

<table>

    <tr>
        <th>ID</th>
        <th>Nom</th>
        <th>Catégorie</th>
        <th>Date d'adhésion</th>
    </tr>

    <tr th:each="m : ${membres}">
        <td th:text="${m.id}"></td>
        <td th:text="${m.nom}"></td>
        <td th:text="${m.categorie}"></td>
        <td th:text="${m.dateAdhesion}"></td>
    </tr>

</table>

</body>
</html>
