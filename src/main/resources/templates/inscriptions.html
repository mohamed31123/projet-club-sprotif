<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Gestion des Inscriptions</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f8;
            padding:40px;
        }

        h2{
            color:#222;
        }

        form{
            background:white;
            padding:20px;
            border-radius:8px;
            width:400px;
            margin-bottom:30px;
        }

        input,select{
            width:100%;
            padding:8px;
            margin:8px 0;
        }

        button{
            background:#2e7d32;
            color:white;
            border:none;
            padding:8px 15px;
            border-radius:4px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
        }

        th{
            background:#2e7d32;
            color:white;
        }

    </style>

</head>

<body>

<h2>Gestion des Inscriptions</h2>

<h3>Nouvelle inscription</h3>

<form th:action="@{/inscriptions}" method="post">

    <label>Date d'inscription :</label>
    <input type="date" name="dateInscription">

    <label>Statut :</label>
    <select name="statut">
        <option value="Payé">Payé</option>
        <option value="En attente">En attente</option>
    </select>

    <label>Montant :</label>
    <input type="number" step="0.01" name="montant">

    <label>Activité :</label>
    <select name="activite.id">
        <option th:each="a : ${activites}"
                th:value="${a.id}"
                th:text="${a.nom}">
        </option>
    </select>

    <label>Membre :</label>
    <select name="membre.id">
        <option th:each="m : ${membres}"
                th:value="${m.id}"
                th:text="${m.nom}">
        </option>
    </select>

    <button type="submit">Enregistrer</button>

</form>

<h3>Liste des inscriptions</h3>

<table>

    <tr>
        <th>ID</th>
        <th>Membre</th>
        <th>Activité</th>
        <th>Date</th>
        <th>Statut</th>
        <th>Montant</th>
    </tr>

    <tr th:each="i : ${inscriptions}">
        <td th:text="${i.id}"></td>
        <td th:text="${i.membre.nom}"></td>
        <td th:text="${i.activite.nom}"></td>
        <td th:text="${i.dateInscription}"></td>
        <td th:text="${i.statut}"></td>
        <td th:text="${i.montant}"></td>
    </tr>

</table>

</body>
</html>
